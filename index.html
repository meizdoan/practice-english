<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Mastery - No More Errors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .correct-glow { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); border-color: #22c55e; }
        .wrong-glow { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20">

    <div class="max-w-3xl mx-auto p-4 md:p-10">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">Reflex English <span class="text-blue-600">PRO</span></h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Luyện dịch phản xạ không cần API Key</p>
        </header>

        <section class="bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100">
            <div class="flex gap-2 mb-8 justify-center">
                <button onclick="setTopic('Công việc')" class="topic-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 text-slate-500 hover:bg-blue-600 hover:text-white transition-all">💼 CÔNG VIỆC</button>
                <button onclick="setTopic('Du lịch')" class="topic-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 text-slate-500 hover:bg-blue-600 hover:text-white transition-all">✈️ DU LỊCH</button>
                <button onclick="setTopic('Đời sống')" class="topic-btn px-4 py-2 rounded-full text-xs font-bold bg-slate-100 text-slate-500 hover:bg-blue-600 hover:text-white transition-all">🏠 ĐỜI SỐNG</button>
            </div>

            <div class="mb-8 text-center min-h-[80px] flex items-center justify-center">
                <p id="vi-display" class="text-2xl md:text-3xl font-bold text-slate-800 leading-tight italic">Đang tải...</p>
            </div>

            <div class="relative mb-4">
                <textarea id="en-input" rows="3" 
                    placeholder="Gõ bản dịch tiếng Anh của bạn tại đây..." 
                    class="w-full p-5 text-lg border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all shadow-inner"></textarea>
            </div>

            <div class="flex gap-3">
                <button onclick="handleCheck()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-600 transition-all active:scale-95 shadow-lg">KIỂM TRA (ENTER)</button>
                <button onclick="loadQuestion()" class="px-6 bg-slate-100 text-slate-400 rounded-2xl hover:bg-slate-200 transition-all text-xl">➔</button>
            </div>

            <div id="result-box" class="mt-6 hidden p-5 rounded-2xl border-2 animate-bounce-short">
                <p id="result-text" class="font-bold mb-1"></p>
                <p id="result-sample" class="text-sm opacity-80 italic"></p>
            </div>
        </section>

        <div class="mt-10 text-center">
            <details class="text-slate-400">
                <summary class="text-[10px] cursor-pointer hover:text-blue-500 font-bold uppercase tracking-widest">Cấu hình nâng cao (AI Explanation)</summary>
                <div class="mt-4 flex max-w-xs mx-auto gap-2">
                    <input type="password" id="api-key" placeholder="Nhập Gemini Key..." class="flex-1 p-2 text-xs border rounded-lg outline-none">
                    <button onclick="saveKey()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-[10px] font-bold">LƯU</button>
                </div>
            </details>
        </div>
    </div>

    <script>
        // BỘ DỮ LIỆU TỰ THÂN (Self-contained Data)
        const database = [
            { t: "Công việc", vi: "Tôi sẽ gửi cho bạn bản báo cáo vào sáng mai.", en: "I will send you the report tomorrow morning." },
            { t: "Công việc", vi: "Chúng ta cần thảo luận về dự án này trong cuộc họp.", en: "We need to discuss this project in the meeting." },
            { t: "Công việc", vi: "Bạn có thể giúp tôi chuẩn bị tài liệu không?", en: "Can you help me prepare the documents?" },
            { t: "Du lịch", vi: "Khách sạn này cách trung tâm thành phố bao xa?", en: "How far is this hotel from the city center?" },
            { t: "Du lịch", vi: "Tôi muốn đặt một phòng đơn cho hai đêm.", en: "I'd like to book a single room for two nights." },
            { t: "Đời sống", vi: "Bạn có muốn đi ăn tối cùng tôi tối nay không?", en: "Would you like to have dinner with me tonight?" },
            { t: "Đời sống", vi: "Tôi đang học tiếng Anh để tìm một công việc tốt hơn.", en: "I am learning English to find a better job." }
        ];

        let currentTopic = "Công việc";
        let currentQ = {};

        function setTopic(name) {
            currentTopic = name;
            loadQuestion();
        }

        function loadQuestion() {
            const filtered = database.filter(q => q.t === currentTopic);
            currentQ = filtered[Math.floor(Math.random() * filtered.length)];
            
            document.getElementById('vi-display').innerText = currentQ.vi;
            document.getElementById('en-input').value = "";
            document.getElementById('en-input').className = "w-full p-5 text-lg border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 transition-all shadow-inner";
            document.getElementById('result-box').classList.add('hidden');
            document.getElementById('en-input').focus();
        }

        function handleCheck() {
            const userInp = document.getElementById('en-input');
            const userAns = userInp.value.trim().toLowerCase().replace(/[.,?!]/g, "");
            const correctAns = currentQ.en.toLowerCase().replace(/[.,?!]/g, "");
            const resultBox = document.getElementById('result-box');
            
            resultBox.classList.remove('hidden');

            if (userAns === correctAns) {
                userInp.className = "w-full p-5 text-lg border-2 rounded-2xl outline-none transition-all shadow-inner correct-glow";
                resultBox.className = "mt-6 p-5 rounded-2xl border-2 bg-green-50 border-green-200 text-green-700";
                document.getElementById('result-text').innerText = "✅ Rất tuyệt vời!";
                document.getElementById('result-sample').innerText = "Bạn đã dịch chính xác từng từ.";
                setTimeout(loadQuestion, 2000);
            } else {
                userInp.className = "w-full p-5 text-lg border-2 rounded-2xl outline-none transition-all shadow-inner wrong-glow";
                resultBox.className = "mt-6 p-5 rounded-2xl border-2 bg-red-50 border-red-200 text-red-700";
                document.getElementById('result-text').innerText = "❌ Chưa chính xác rồi";
                document.getElementById('result-sample').innerText = `Đáp án đúng: "${currentQ.en}"`;
            }
        }

        function saveKey() {
            localStorage.setItem('gemini_key', document.getElementById('api-key').value.trim());
            alert("Đã lưu Key! Tính năng AI giải thích đã được kích hoạt (nếu Key khả dụng).");
        }

        // Bắt sự kiện Enter
        document.getElementById('en-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleCheck();
            }
        });

        window.onload = loadQuestion;
    </script>
</body>
</html>
